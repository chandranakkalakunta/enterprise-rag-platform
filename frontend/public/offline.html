<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline — Enterprise RAG</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      main {
        max-width: 28rem;
        text-align: center;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0.5rem 0;
        color: #94a3b8;
        font-size: 0.95rem;
      }
      a {
        color: #38bdf8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline</h1>
      <p>
        The app shell is available offline, but answers, upload, and admin
        actions require a network connection.
      </p>
      <p><a href="/">Try again</a></p>
    </main>
  </body>
</html>
